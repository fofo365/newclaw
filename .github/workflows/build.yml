name: Build NewClaw

on:
  push:
    branches: [main, master, dev]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 手动触发

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: test-cache
          
      - name: Run cargo check
        run: cargo check --all-targets
        
      - name: Run cargo test
        run: cargo test --no-fail-fast
        
      - name: Run cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        
      - name: Check formatting
        run: cargo fmt -- --check

  build:
    name: Build Release
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: release-cache
          
      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu
        
      - name: Strip binary
        run: strip target/x86_64-unknown-linux-gnu/release/newclaw
        
      - name: Get version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(git describe --tags --always)" >> $GITHUB_OUTPUT
          fi
          
      - name: Create tarball
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar -czf newclaw-linux-x64-${{ steps.version.outputs.VERSION }}.tar.gz newclaw
          mv newclaw-linux-x64-${{ steps.version.outputs.VERSION }}.tar.gz $GITHUB_WORKSPACE/
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: newclaw-linux-x64-${{ steps.version.outputs.VERSION }}
          path: newclaw-linux-x64-${{ steps.version.outputs.VERSION }}.tar.gz
          retention-days: 90
          
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: newclaw-linux-x64-${{ steps.version.outputs.VERSION }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 可选：构建 Docker 镜像
  docker:
    name: Build Docker Image
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 通知构建结果
  notify:
    name: Notify Build Status
    needs: [test, build]
    runs-on: ubuntu-latest
    if: always() && (needs.build.result == 'success' || needs.build.result == 'failure')
    
    steps:
      - name: Get version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi
          
      - name: Send notification
        run: |
          echo "Build Status: ${{ needs.build.result }}"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Download: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.VERSION }}"
